<!-- this is the homepage -->

<!DOCTYPE html>
<html>
    <head>
        <title>ISO Synch Dashboard</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/styles.css">
    </head>

    <body>

        <div class="app">
            <!-- sidebar -->
            <aside class="sidebar">
                <div class="brand">
                    <img src="/images/logo.png" style="width: 40px; border-radius: 5px;">
                    <div>
                        <div class="brand-name">ISO Synch</div>
                        <div class="brand-sub">Event Management</div>
                    </div>
                </div>

                <div class="nav-eyebrow">Workspace</div>
                <nav>
                    <a class="nav-item active" href="/dashboard">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
                        Dashboard
                    </a>
                    <a class="nav-item" href="/manage-events">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M9 16l2 2 4-4"/></svg>
                        Manage Events
                    </a>
                    <a class="nav-item" href="/profile">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21a8 8 0 0 0-16 0"/>
                            <circle cx="12" cy="8" r="4"/>
                        </svg>
                        Profile
                    </a>
                </nav>

                <div class="sidebar-spacer"></div>

                <div class="profile">
                    <div class="avatar" id="avatar">
                        JD
                    </div>
                    <div>
                        <div class="profile-name" id="profileName">
                            John Doe
                        </div>
                        <div class="profile-role">Coordinator</div>
                    </div>
                </div>

                <button class="logout-btn" onclick="logout()">
                    Logout
                </button>

            </aside>

            <main class="main">
                <section class="panel" id="dashboard">
                    <div class="page-eyebrow">Overview</div>
                    <div class="page-title">Event Management System</div>

                    <!-- TODO: change dummy values -->
                    <div class="stats">
                        <div class="stat n1"><div class="stat-num" id="upcomingCount">0</div><div class="stat-label">Upcoming events</div></div>
                        <div class="stat n2"><div class="stat-num">45</div><div class="stat-label">Registered guests</div></div>
                        <div class="stat n3"><div class="stat-num">01</div><div class="stat-label">Venues booked</div></div>
                    </div>

                    <div class="card">
                        <div class="card-head">
                            <div class="card-title">Upcoming Events<small>Upcoming ISO seminars, meetings, and such</small></div>
                        </div>

                        <div id="eventsContainer">
                        </div>  
                    </div>
                </section>
            </main>
        </div>

        <script>
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const categoryTagClass = { Meeting: 'work', 'Seminar/Workshop': 'personal', Gathering: 'entertainment' };

            if (!currentUser) {
                window.location.href = '/login';
            } else {
                document.getElementById('profileName').textContent = `${currentUser.firstName} ${currentUser.lastName}`;
                document.getElementById('avatar').textContent = `${currentUser.firstName[0]}${currentUser.lastName[0]}`.toUpperCase();
                loadEvents();
            }

            function logout() {
                localStorage.removeItem('currentUser');
                window.location.href = '/login';
            }

            function formatDate(dateStr) {
                const date = new Date(`${dateStr}T00:00:00`);
                return { day: date.getDate(), month: date.toLocaleString('en-US', { month: 'short' }) };
            }

            function escapeHtml(value) {
                return String(value || '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char]);
            }

            async function loadEvents() {
                const container = document.getElementById('eventsContainer');
                try {
                    const response = await fetch('/api/events');
                    if (!response.ok) throw new Error('Unable to load events');
                    const events = await response.json();
                    events.sort((a, b) => new Date(`${a.date}T${a.startTime}`) - new Date(`${b.date}T${b.startTime}`));
                    document.getElementById('upcomingCount').textContent = events.length;
                    container.innerHTML = events.map(event => {
                        const date = formatDate(event.date);
                        return `<div class="event-row"><div class="date-chip"><b>${date.day}</b><span>${date.month}</span></div><div><div class="event-title">${escapeHtml(event.name || event.title)}</div><div class="event-meta">${escapeHtml(event.venue || event.location)}<span class="tag ${categoryTagClass[event.category] || 'work'}">${escapeHtml(event.category || 'Meeting')}</span></div></div><button class="ghost-btn" onclick="window.location.href='/event-details?id=${encodeURIComponent(event.id)}'">Details</button></div>`;
                    }).join('') || '<p class="no-events">No upcoming events yet.</p>';
                } catch (error) {
                    container.innerHTML = '<p class="no-events">Unable to load events. Please refresh and try again.</p>';
                }
            }
        </script>

    </body>
</html>

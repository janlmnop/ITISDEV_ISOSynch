<!-- this is the homepage -->

<!DOCTYPE html>
<html>
    <head>
        <title>ISO Synch Dashboard</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/styles.css">
    </head>

    <body>

        <div class="app">
            <!-- sidebar -->
            <aside class="sidebar">
                <div class="brand">
                    <img src="/images/logo.png" style="width: 40px; border-radius: 5px;">
                    <div>
                        <div class="brand-name">ISO Synch</div>
                        <div class="brand-sub">Event Management</div>
                    </div>
                </div>

                <div class="nav-eyebrow">Workspace</div>
                <nav>
                    <a class="nav-item active" href="index.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
                        Dashboard
                    </a>
                    <a class="nav-item" href="manage-events.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M9 16l2 2 4-4"/></svg>
                        Manage Events
                    </a>
                </nav>

                <div class="sidebar-spacer"></div>

                <div class="profile">
                    <div class="avatar">JD</div>
                    <div>
                        <div class="profile-name">John Doe</div>
                        <div class="profile-role">Coordinator</div>
                    </div>
                </div>
            </aside>

            <main class="main">
                <section class="panel" id="dashboard">
                    <div class="page-eyebrow">Overview</div>
                    <div class="page-title">Event Management System</div>

                    <!-- TODO: change dummy values -->
                    <div class="stats">
                        <div class="stat n1"><div class="stat-num">01</div><div class="stat-label">Upcoming events</div></div>
                        <div class="stat n2"><div class="stat-num">45</div><div class="stat-label">Registered guests</div></div>
                        <div class="stat n3"><div class="stat-num">01</div><div class="stat-label">Venues booked</div></div>
                    </div>

                    <div class="card">
                        <div class="card-head">
                            <div class="card-title">Upcoming Events<small>Upcoming ISO seminars, meetings, and such</small></div>
                        </div>

                        <div class="event-row">
                            <div class="date-chip"><b>18</b><span>Jul</span></div>
                            <div>
                                <div class="event-title">General Assembly</div>
                                <div class="event-meta">G106<span class="tag entertainment">Gathering</span></div>
                            </div>
                            <button class="ghost-btn">Details</button>
                        </div>
                    </div>
                </section>
            </main>
        </div>

    </body>
</html>

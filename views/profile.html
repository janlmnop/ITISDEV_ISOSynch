<!DOCTYPE html>
<html>
<head>
    <title>My Profile | ISO Synch</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="brand">
            <img src="/images/logo.png" style="width:40px;border-radius:5px;">
            <div>
                <div class="brand-name">ISO Synch</div>
                <div class="brand-sub">Event Management</div>
            </div>
        </div>

        <div class="nav-eyebrow">Workspace</div>

        <nav>

            <a class="nav-item" href="/dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <rect x="3" y="3" width="7" height="9" rx="1.5"/>
                    <rect x="14" y="3" width="7" height="5" rx="1.5"/>
                    <rect x="14" y="12" width="7" height="9" rx="1.5"/>
                    <rect x="3" y="16" width="7" height="5" rx="1.5"/>
                </svg>
                Dashboard
            </a>

            <a class="nav-item" id="navManageEvents" href="/manage-events">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <path d="M16 2v4M8 2v4M3 10h18"/>
                    <path d="M9 16l2 2 4-4"/>
                </svg>
                Manage Events
            </a>

            <a class="nav-item active" href="/profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M20 21a8 8 0 0 0-16 0"/>
                </svg>
                Profile
            </a>

        </nav>

        <div class="sidebar-spacer"></div>

        <div class="profile">
            <div class="avatar" id="avatar">
                JD
            </div>

            <div>
                <div class="profile-name" id="profileName">
                    John Doe
                </div>

                <div class="profile-role" id="profileRole">
                    Member
                </div>
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </aside>

    <!-- Main -->

    <main class="main">

        <div class="page-eyebrow">
            ACCOUNT
        </div>

        <div class="page-title">
            My Profile
        </div>

        <div class="card">

            <div class="field">
                <label>Profile Picture</label>
                <input type="file" id="profilePicture" accept="image/*">
            </div>

            <br>

            <div class="field">
                <label>First Name</label>
                <input type="text" id="firstName">
            </div>

            <br>

            <div class="field">
                <label>Last Name</label>
                <input type="text" id="lastName">
            </div>

            <br>

            <div class="field">
                <label>Email</label>
                <input type="email" id="email" readonly>
            </div>

            <br>

            <div class="field">
                <label>Mobile Number</label>
                <input type="text" id="mobile">
            </div>

            <br>

            <div class="field">
                <label>Course</label>
                <input type="text" id="course">
            </div>

            <br>

            <div class="field">
                <label>Year Level</label>
                <input type="text" id="year">
            </div>

            <br>

            <button class="primary-btn" id="saveBtn">
                Save Changes
            </button>

        </div>

    </main>

</div>

<script>

const currentUser = JSON.parse(localStorage.getItem('currentUser'));

if (!currentUser){
    window.location.href="/login";
}else{
    document.getElementById("profileName").textContent =
        currentUser.firstName + " " + currentUser.lastName;

    document.getElementById("avatar").textContent =
        (currentUser.firstName[0] + currentUser.lastName[0]).toUpperCase();

    const role = currentUser.role || "member";
    document.getElementById("profileRole").textContent = role.charAt(0).toUpperCase() + role.slice(1);
    if (role !== "admin") {
        const navManageEvents = document.getElementById("navManageEvents");
        if (navManageEvents) navManageEvents.style.display = "none";
    }
}

function logout(){
    localStorage.removeItem("currentUser");
    window.location.href="/login";
}

</script>

<script src="/js/profile.js"></script>

</body>
</html>
